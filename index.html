<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Result Portal</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
}

.container {
  max-width: 650px;
  margin: 40px auto;
  text-align: center;
}

.header-main {
  padding: 25px;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  animation: fadeIn 1.5s ease;
  border: 2px solid white;
}

.header-main h1 {
  margin: 5px;
  font-size: 26px;
  font-weight: bold;
}

.header-main h3 {
  margin: 5px;
  color: #e6f7ff;
}

.header-main h2 {
  margin-top: 10px;
  color: yellow;
  letter-spacing: 1px;
}

.header-main p {
  margin-top: 5px;
  font-size: 14px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);} 
  to {opacity: 1; transform: translateY(0);} 
}

input {
  padding: 12px;
  width: 75%;
  border-radius: 10px;
  border: none;
  margin: 6px;
  font-size: 14px;
}

button {
  padding: 12px 18px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #00e6ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0072ff;
  color: white;
}

.marksheet {
  background: #ffffff !important;     /* Solid white - fixes fading */
  padding: 30px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: none;                   /* Shadow doesn't render well in PDF */
  color: #000000;
  animation: fadeIn 1s ease;
  border: 3px solid #0072ff;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.table th {
  background: linear-gradient(#0072ff,#00c6ff) !important;
  color: white;
  padding: 10px;
}

.table th, .table td {
  border: 1px solid #000000;
  padding: 10px;
  text-align: center;
  font-size: 15px;
}

.footer-sign {
  margin-top: 40px;
  text-align: right;
  color: #000000;
}

.main-footer {
  margin-top: 50px;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-top: 1px solid rgba(255,255,255,0.3);
  text-align: center;
  font-size: 14px;
  color: #ddd;
}

.download {
  margin-top: 15px;
  background: #008000;
  color: white;
  padding: 12px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header-main">
    <h1>Ram Thakur Chaudhary Inter College</h1>
    <h3>Parsauna, Balrampur - 271604</h3>
    <h3>Annual Examination 2025-26</h3>
    <h2>RESULT LIVE</h2>
    <p>Students can check and download their results now</p>
  </div>

  <br>
  <input type="text" id="classInput" placeholder="Enter Class (e.g. 10)" style="text-transform:uppercase">
  <br>
  <input type="number" id="rollInput" placeholder="Enter Roll Number">
  <br>
  <button onclick="checkResult()">Check Result</button>

  <div id="resultBox"></div>

</div>

<div class="main-footer">
  <p>© 2025-26 Ram Thakur Chaudhary Inter College</p>
  <p>Parsauna, Balrampur - 271604</p>
  <p>All Rights Reserved | Designed by Rajveer Singh 💓</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>
async function checkResult() {
  const roll = document.getElementById("rollInput").value.trim();
  const cls = document.getElementById("classInput").value.trim().toUpperCase();
  const resultBox = document.getElementById("resultBox");

  if (!roll || !cls) {
    resultBox.innerHTML = "⚠️ Please enter both Class and Roll Number";
    return;
  }

  resultBox.innerHTML = "🔍 Loading...";

  try {
    const response = await fetch("results.csv");
    if (!response.ok) throw new Error("CSV not found");
    
    const text = await response.text();
    const rows = text.split("\n").map(r => r.trim().split(","));
    const data = rows.slice(1);

    const student = data.find(row => 
      Number(row[0]) === Number(roll) && row[3].trim().toUpperCase() === cls
    );

    if (student && student.length > 12) {
      resultBox.innerHTML = `
      <div class="marksheet" id="marksheet">
        <h2 style="text-align:center;color:#003366;font-size:26px;margin-bottom:20px;">Result Marksheet</h2>

        <p><b style="color:#003366;">Name:</b> ${student[1]}</p>
        <p><b style="color:#003366;">Father Name:</b> ${student[2]}</p>
        <p><b style="color:#003366;">Class:</b> ${student[3]}</p>
        <p><b style="color:#003366;">Roll No:</b> ${student[0]}</p>

        <table class="table">
          <tr><th>Subject</th><th>Marks</th></tr>
          <tr><td>Hindi</td><td>${student[4]}</td></tr>
          <tr><td>English</td><td>${student[5]}</td></tr>
          <tr><td>Maths</td><td>${student[6]}</td></tr>
          <tr><td>Science</td><td>${student[7]}</td></tr>
          <tr><td>Social Science</td><td>${student[8]}</td></tr>
          <tr><td>Moral Edu. & G.K</td><td>${student[9]}</td></tr>
          <tr><td>Arts</td><td>${student[10]}</td></tr>
        </table>

        <p style="font-size:18px;margin:15px 0;"><b style="color:#003366;">Total:</b> ${student[11]} / 600</p>
        <p style="font-size:18px;"><b style="color:#003366;">Result:</b> <span style="color:${student[12]==='Pass' ? '#008000' : '#d32f2f'};font-weight:bold;">${student[12]}</span></p>
        <p style="font-size:18px;"><b style="color:#003366;">Grade:</b> ${student[13]}</p>

        <div class="footer-sign">
          <p><i>Digitally Signed by</i></p>
          <p><b>Rajveer Singh</b></p>
          <p>Assistant Teacher</p>
        </div>
      </div>

      <button class="download" onclick="downloadPDF()">📥 Download PDF</button>
      `;
    } else {
      resultBox.innerHTML = "❌ Result not found.<br>Please check Class & Roll Number correctly.";
    }
  } catch (err) {
    resultBox.innerHTML = "⚠️ Error loading results. Please try again later.";
    console.error(err);
  }
}

function downloadPDF() {
  const element = document.getElementById("marksheet");

  const opt = {
    margin: [15, 15, 15, 15],
    filename: `Result_Class${document.getElementById("classInput").value.trim()}_Roll${document.getElementById("rollInput").value.trim()}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 3,                    // Higher = sharper, less faded
      useCORS: true,
      backgroundColor: '#ffffff',  // Force pure white
      logging: false
    },
    jsPDF: {
      unit: 'mm',
      format: 'a4',
      orientation: 'portrait'
    }
  };

  html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
